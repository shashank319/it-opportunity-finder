# =============================================================================
# IT Opportunity Finder — configuration
# =============================================================================
# This is the ONE file a non-technical teammate edits to tune the tool.
# Nothing here is secret. API keys/passwords live in GitHub Actions Secrets,
# NEVER in this file.
#
# Scope reminder: STATE, COUNTY, and CITY (SLED) sources ONLY. No federal.
# =============================================================================


# -----------------------------------------------------------------------------
# SOURCES — where opportunities come from. Each is a pluggable adapter.
# -----------------------------------------------------------------------------
sources:

  # --- Socrata (SODA) open-data datasets -------------------------------------
  # Generic reader for any Socrata portal. Add a city/state by copying a block.
  # Find datasets at: https://<domain>/browse  or the Socrata discovery API:
  #   https://api.us.socrata.com/api/catalog/v1?q=solicitation&only=dataset
  # field_map maps THAT dataset's column names -> our normalized fields.
  socrata_datasets:

    # ---- LIVE, WORKING, NO API KEY: a real county solicitations feed. --------
    # Montgomery County, Maryland publishes active solicitations (RFP/IFB) here.
    - name: "Montgomery County MD — Solicitations"
      enabled: true
      domain: data.montgomerycountymd.gov
      dataset_id: eeq6-nnwe
      state: MD
      where: "status='Active'"          # only currently-open solicitations
      order: "issuancedate DESC"
      limit: 1000
      field_map:
        id: number                      # solicitation number (stable id)
        title: description              # this dataset's "description" IS the title
        description: description
        agency: department
        posted_date: issuancedate
        due_date: closingdate
        set_aside: lsbrpindicator       # local small-business flag
      # This dataset has no per-row URL, so we link to the county's official
      # solicitations hub. Find the specific bid there by its solicitation
      # number (shown in the title / on the dashboard).
      source_url: "https://www.montgomerycountymd.gov/office-procurement/solicitations-contracts"

    # =========================================================================
    # More live, verified, no-key feeds across the U.S. (added in bulk).
    # Every one below was checked to be live and return rows. Mix of true
    # OPEN-solicitation feeds and a couple of contract-notice feeds for
    # geographic coverage. Disable any you don't want by setting enabled: false.
    # =========================================================================

    # ---- WEST ----
    - name: "Los Angeles County CA — RAMP Open Bids"
      enabled: true
      domain: data.lacity.org
      dataset_id: hf3r-utnq
      state: CA
      where: "stagename='Open'"
      order: "bidpost DESC"
      limit: 500
      field_map: { id: rampid, title: title, description: category, agency: department, posted_date: bidpost, due_date: closedate, url: url }
      source_url: "https://www.rampla.org/s/"

    - name: "San Francisco CA — Open Bids"
      enabled: true
      domain: data.sfgov.org
      dataset_id: eshn-8t3a
      state: CA
      where: "status='Open'"
      order: "open_date DESC"
      limit: 500
      field_map: { id: event_id, title: title, description: type, agency: department, posted_date: open_date, due_date: due_date, url: sfcitypartner_link }
      source_url: "https://sfcitypartner.sfgov.org/"

    - name: "Oregon — Active Statewide Price Agreements"
      enabled: true
      domain: data.oregon.gov
      dataset_id: knjg-wn2a
      state: OR
      where: ""
      order: "blanket_begin_date DESC"
      limit: 500
      field_map: { id: po_nbr, title: blanket_description, description: nigp_codes, agency: org_name, posted_date: blanket_begin_date, due_date: blanket_end_date }
      source_url: "https://oregonbuys.gov/"

    - name: "Mesa AZ — Purchasing Solicitations"
      enabled: true
      domain: citydata.mesaaz.gov
      dataset_id: dfcn-ivuc
      state: AZ
      where: "solicitation=true"
      order: "creation_date DESC"
      limit: 500
      # No true bid-deadline column here, so we leave due_date blank and rely on
      # post-date recency (the active-only filter) instead of a fake deadline.
      field_map: { id: contract_no, title: contract_description, description: type, agency: type, posted_date: creation_date }
      source_url: "https://www.mesaaz.gov/business/purchasing"

    # ---- SOUTH / SOUTH-CENTRAL ----
    - name: "Baton Rouge LA — Upcoming Procurement"
      enabled: true
      domain: data.brla.gov
      dataset_id: e5pk-us93
      state: LA
      where: ""
      order: "anticipated_ad_date DESC"
      limit: 500
      field_map: { id: contract_desc, title: contract_desc, description: project_description, agency: department, posted_date: anticipated_ad_date, due_date: anticipated_ad_date }
      source_url: "https://www.brla.gov/298/Purchasing-Division"

    - name: "Baton Rouge LA — Bid Openings"
      enabled: true
      domain: data.brla.gov
      dataset_id: u9zk-8nix
      state: LA
      where: ""
      order: "bid_date DESC"
      limit: 500
      field_map: { id: unique_id, title: description, description: note, agency: department_name, posted_date: bid_date, due_date: bid_date }
      source_url: "https://www.brla.gov/298/Purchasing-Division"

    - name: "Texas — Spot Bid Fair FY2026"
      enabled: true
      domain: data.texas.gov
      dataset_id: 3iy3-r5vp
      state: TX
      where: ""
      order: "timestamp DESC"
      limit: 500
      # timestamp is a post/scrape time, not a bid deadline — leave due_date blank.
      field_map: { id: solicitation_number, title: description, description: description, agency: agency_name, posted_date: timestamp, url: solicitation_document }
      source_url: "https://comptroller.texas.gov/purchasing/"

    - name: "Texas DOT — Plan Holders (Open Lettings)"
      enabled: true
      domain: data.texas.gov
      dataset_id: jd6h-b87p
      state: TX
      where: ""
      order: "bid_received_until_date_and_time DESC"
      limit: 500
      field_map: { id: controlling_project_id_ccsj, title: proposal_request, description: project_type, agency: district_division, posted_date: bid_received_until_date_and_time, due_date: bid_received_until_date_and_time }
      source_url: "https://www.txdot.gov/business/letting-bids.html"

    # ---- NORTHEAST ----
    - name: "New York City — City Record (Procurement)"
      enabled: true
      domain: data.cityofnewyork.us
      dataset_id: dg92-zbpx
      state: NY
      where: "section_name='Procurement'"
      order: "start_date DESC"
      limit: 500
      # NOTE: this feed's long-description field is mostly boilerplate ("go to
      # our website to download..."), which caused false matches. We judge NYC
      # items on their real title instead, so the subject drives inclusion.
      field_map: { id: request_id, title: short_title, description: short_title, agency: agency_name, posted_date: start_date, due_date: end_date }
      source_url: "https://a856-cityrecord.nyc.gov/"

    - name: "New York City — Current RFP (MOCS)"
      enabled: true
      domain: data.cityofnewyork.us
      dataset_id: bzjf-rmtp
      state: NY
      where: ""
      order: "due_date DESC"
      limit: 500
      field_map: { id: solicitation_number, title: services, description: services, agency: department, posted_date: data_as_of_date, due_date: due_date }
      source_url: "https://www.nyc.gov/site/mocs/index.page"

    - name: "New York State — SUCF Advertised Procurements"
      enabled: true
      domain: data.ny.gov
      dataset_id: vtxv-3j2b
      state: NY
      where: ""
      order: "contract_advertise_date DESC"
      limit: 500
      field_map: { id: project, title: project_title, description: project_title, agency: campus_name, posted_date: contract_advertise_date, due_date: proposal_due_date }
      source_url: "https://www.sucf.suny.edu/"

    - name: "Delaware — Open Bids (Statewide)"
      enabled: true
      domain: data.delaware.gov
      dataset_id: 2hnj-zwix
      state: DE
      where: ""
      order: "deadlinedate DESC"
      limit: 500
      field_map: { id: contractnumber, title: contracttitle, description: contracttitle, agency: agencycode, posted_date: opendate, due_date: deadlinedate, url: bidurl }
      source_url: "https://mmp.delaware.gov/Bids/"

    - name: "Delaware — Recently Closed Bids (Statewide)"
      enabled: false
      domain: data.delaware.gov
      dataset_id: yhim-4378
      state: DE
      where: ""
      order: "deadlinedate DESC"
      limit: 500
      field_map: { id: contractnumber, title: contracttitle, description: contracttitle, agency: agencycode, posted_date: opendate, due_date: deadlinedate, url: bidurl }
      source_url: "https://mmp.delaware.gov/Bids/"

    - name: "Montgomery County MD — Proposed Awardee (Solicitations)"
      enabled: false
      domain: data.montgomerycountymd.gov
      dataset_id: ecp6-b47r
      state: MD
      where: "cancelled='N'"
      order: "date_published DESC"
      limit: 500
      field_map: { id: solicitation_number, title: description, description: award_item, agency: dept_name, posted_date: date_published, due_date: date_published }
      source_url: "https://www.montgomerycountymd.gov/office-procurement/solicitations-contracts"

    - name: "Montgomery County MD — Open Solicitations (Contracts)"
      enabled: true
      domain: data.montgomerycountymd.gov
      dataset_id: vmu2-pnrc
      state: MD
      where: "contracttype='Open Solicitation'"
      order: "execution DESC"
      limit: 500
      field_map: { id: solicitationnumber, title: contractdesc, description: contractdesc, agency: deptname, posted_date: execution, due_date: expiration }
      source_url: "https://www.montgomerycountymd.gov/office-procurement/solicitations-contracts"

    # ---- MIDWEST ----
    - name: "Cook County IL — Intent to Award"
      enabled: false
      domain: datacatalog.cookcountyil.gov
      dataset_id: bgq7-v7ms
      state: IL
      where: ""
      order: "posting_date DESC"
      limit: 500
      field_map: { id: contract_number, title: description, description: recommended_action, agency: department, posted_date: posting_date, due_date: posting_date, url: link }
      source_url: "https://www.cookcountyil.gov/service/view-bid-opportunities"

    - name: "Cook County IL — Bid Tabulations"
      enabled: false
      domain: datacatalog.cookcountyil.gov
      dataset_id: 32au-zaqn
      state: IL
      where: ""
      order: "bid_opening_date DESC"
      limit: 500
      field_map: { id: contract_number, title: project_name, description: procurement_type, agency: department_name, posted_date: bid_opening_date, due_date: bid_opening_date }
      source_url: "https://www.cookcountyil.gov/service/view-bid-opportunities"

    - name: "Cincinnati OH — Business Opportunities (Bids & RFPs)"
      enabled: true
      domain: data.cincinnati-oh.gov
      dataset_id: pid3-z56k
      state: OH
      where: ""
      order: "date_due DESC"
      limit: 500
      field_map: { id: bid_project_number, title: project_name, description: procurement_type, agency: requesting_department, posted_date: date_due, due_date: date_due, url: bid_booklet_pdf }
      source_url: "https://www.cincinnati-oh.gov/purchasing/bid-opportunities/"

    - name: "Illinois — Capital Dev Board Future Solicitations"
      enabled: true
      domain: illinois-edp.data.socrata.com
      dataset_id: 6rb8-ntpm
      state: IL
      where: ""
      order: "estimated_bid_date DESC"
      limit: 500
      field_map: { id: project_number, title: description, description: approximate_cost, agency: location_name, posted_date: estimated_bid_date, due_date: estimated_bid_date }
      source_url: "https://cdb.illinois.gov/business/architects-engineers.html"

    # ---- SOUTHEAST (contract-notice feeds — thin Socrata coverage here, but
    #      each row carries the RFP/IFB solicitation reference) ----
    - name: "Richmond VA — City Contracts (RFP/IFB)"
      enabled: false
      domain: data.richmondgov.com
      dataset_id: xqn7-jvv2
      state: VA
      where: ""
      order: "effective_from DESC"
      limit: 500
      field_map: { id: contract_number, title: description, description: description, agency: agency_department, posted_date: effective_from, due_date: effective_to }
      source_url: "https://www.rva.gov/procurement-services"

    - name: "Atlanta GA — Contracts (RFP/IFB)"
      enabled: false
      domain: atlanta.data.socrata.com
      dataset_id: s39g-udq5
      state: GA
      where: ""
      order: "legislation_date DESC"
      limit: 500
      field_map: { id: contract_number, title: contract_name, description: contract_name, agency: department, posted_date: legislation_date, due_date: contract_end_date }
      source_url: "https://www.atlantaga.gov/government/departments/department-of-procurement"

    # ---- Awarded-contract datasets (OFF by default: these are historical
    #      *awards*, not open opportunities — flip on only if you want them). ----
    - name: "Austin TX — Contracts (awarded — historical)"
      enabled: false
      domain: datahub.austintexas.gov
      dataset_id: 84ih-p28j
      state: TX
      where: ""
      order: "efbgn_dt DESC"
      limit: 500
      field_map: { id: doc_id, title: doc_dscr, description: cat_dscr, agency: contract_contact_nm, posted_date: efbgn_dt, due_date: brd_awd_dt }
      source_url: "https://www.austintexas.gov/department/purchasing"

    - name: "Cook County IL — Awarded Contracts (historical)"
      enabled: false
      domain: datacatalog.cookcountyil.gov
      dataset_id: qh8j-6k63
      state: IL
      where: ""
      order: "start_date DESC"
      limit: 500
      field_map: { id: contract_number, title: description, description: category, agency: lead_department, posted_date: start_date, due_date: end_date }
      source_url: "https://www.cookcountyil.gov/service/procurement-contracts"

  # --- SAM.gov FEDERAL opportunities (the one federal source) ----------------
  # Every record is tagged state = "US-FED" so you can filter federal in/out on
  # the dashboard. Needs a free API key in the GitHub secret SAM_API_KEY (README).
  # Set enabled: false to hide federal and go back to SLED-only.
  samgov:
    enabled: true
    name: "SAM.gov (Federal)"
    lookback_days: 3            # pull notices posted in the last N days
    limit: 1000
    # One API request per NAICS code. A non-registered SAM key allows only ~10
    # requests/DAY, so keep this list SHORT (4 = 4 requests/day, leaving headroom
    # for manual re-runs). Registering your entity (UEI) at SAM.gov raises the
    # limit to ~1,000/day — then you can safely add more codes.
    naics_codes:
      - "541511"   # custom computer programming
      - "541512"   # computer systems design
      - "541519"   # other computer related services
      - "518210"   # data processing / hosting
    # Notice types: p=presolicitation, o=solicitation, k=combined, r=sources sought.
    notice_types: ["p", "o", "k", "r"]

  # --- PlanetBids agency portals --------------------------------------------
  # Public JSON API per agency (no login). Add an agency by adding its portalId
  # (the number in its portal URL: vendors.planetbids.com/portal/<portalId>/...).
  # One request per agency; grows to any number of agencies.
  planetbids:
    enabled: true
    name: "PlanetBids"
    open_stages: ["Bidding"]     # which stage counts as "accepting bids"
    agencies:
      - { portal_id: 15300, agency: "City of Sacramento, CA", state: CA }
      - { portal_id: 13982, agency: "Port of San Diego, CA", state: CA }
      - { portal_id: 27411, agency: "Inland Empire Utilities Agency, CA", state: CA }
      - { portal_id: 45619, agency: "City of Inglewood, CA", state: CA }
      - { portal_id: 15810, agency: "City of Long Beach, CA", state: CA }
      - { portal_id: 16151, agency: "Santa Clara Valley Water District, CA", state: CA }

  # --- OpenGov Procurement portals ------------------------------------------
  # Public "embed" page per agency (no login). Add an agency by adding its slug
  # (the name in its portal URL: procurement.opengov.com/portal/<slug>).
  opengov:
    enabled: true
    name: "OpenGov"
    agencies:
      - { slug: santa-monica-ca, agency: "City of Santa Monica, CA", state: CA }
      - { slug: pasadena, agency: "City of Pasadena, CA", state: CA }
      - { slug: santacruzca, agency: "City of Santa Cruz, CA", state: CA }
      - { slug: phoenix, agency: "City of Phoenix, AZ", state: AZ }
      - { slug: saccounty, agency: "County of Sacramento, CA", state: CA }
      - { slug: ocgov, agency: "County of Orange, CA", state: CA }
      - { slug: acgov, agency: "County of Alameda, CA", state: CA }
      - { slug: smcgov, agency: "County of San Mateo, CA", state: CA }
      - { slug: lacda, agency: "LA County Development Authority, CA", state: CA }

  # --- ArcGIS feature layers -------------------------------------------------
  # Some governments publish open solicitations as an ArcGIS layer with a public
  # query API. Add one by copying a block (query_url + field_map).
  arcgis_layers:
    - name: "Washington DC — Solicitations (PASS)"
      enabled: true
      state: DC
      query_url: "https://maps2.dcgis.dc.gov/dcgis/rest/services/DCGIS_DATA/Government_Operations/MapServer/19/query"
      where: "EVENTDISPLAYSTATUS='OPEN'"
      field_map: { id: SOLICITATIONNUMBER, title: SOLICITATIONTITLE, description: SYNOPSIS, agency: AGENCY_NAME, due_date: CLOSEDATE }
      date_fields: ["due_date"]
      source_url: "https://ocp.dc.gov/service/solicitations"

  # --- Gmail bid-alert ingestion (PRIMARY local coverage) --------------------
  # Reads a dedicated Gmail inbox for alert emails from shared procurement
  # platforms. Turn `enabled: true` AFTER you set up GMAIL_TOKEN_JSON (README).
  # Add a new alert provider by adding a platform block — no code change.
  gmail_alerts:
    enabled: false
    name: "Email Alerts (Gmail)"
    lookback_days: 3          # look back this many days each run (cron is daily)
    max_messages: 200
    # extra_query: "label:bid-alerts"   # optional: restrict to a Gmail label

    platforms:
      # For each platform: match by sender (from_contains), and pull bid-detail
      # links whose URL contains one of link_contains. Optional regexes can pull
      # a deadline/agency out of the email body. Tune these as real alerts arrive.
      - name: PlanetBids
        enabled: true
        from_contains: ["planetbids.com"]
        link_contains: ["planetbids.com/portal", "vendors.planetbids.com"]

      - name: Bonfire
        enabled: true
        from_contains: ["bonfirehub.com", "gobonfire.com"]
        link_contains: ["bonfirehub.com/opportunities", "bonfirehub.com/portal"]

      - name: DemandStar
        enabled: true
        from_contains: ["demandstar.com"]
        link_contains: ["demandstar.com"]

      - name: OpenGov
        enabled: true
        from_contains: ["opengov.com", "procurement.opengov.com"]
        link_contains: ["procurement.opengov.com"]

      - name: Periscope / BidSync
        enabled: true
        from_contains: ["bidsync.com", "periscopeholdings.com", "public.periscopeholdings.com"]
        link_contains: ["bidsync.com", "periscopeholdings.com"]

      - name: Public Purchase
        enabled: true
        from_contains: ["publicpurchase.com"]
        link_contains: ["publicpurchase.com"]

      - name: Vendor Registry
        enabled: true
        from_contains: ["vendorregistry.com"]
        link_contains: ["vendorregistry.com"]

      - name: BidNet
        enabled: true
        from_contains: ["bidnetdirect.com", "bidnet.com"]
        link_contains: ["bidnetdirect.com"]

      - name: Ionwave
        enabled: true
        from_contains: ["ionwave.net"]
        link_contains: ["ionwave.net"]


# -----------------------------------------------------------------------------
# FILTERING — high recall, light touch. INCLUDE on IT keyword OR IT code;
# then drop ONLY clearly non-IT physical work (unless a strong software term
# is also present, in which case KEEP and let a human decide).
# -----------------------------------------------------------------------------
filtering:

  # Include if the title/description contains ANY of these (case-insensitive).
  include_keywords:
    - software
    - application
    - app
    - system
    - systems
    - cloud
    - saas
    - paas
    - iaas
    - migration
    - modernization
    - modernize
    - development
    - developer
    - integration
    - portal
    - website
    - web
    - database
    - data
    - analytics
    - license
    - digital
    - automation
    - rpa
    - workflow
    - platform
    - api
    - ecm
    - content management
    - document management
    - records management
    - laserfiche
    - mendix
    - low-code
    - low code
    - ".net"
    - dotnet
    - java
    - python
    - devops
    - cybersecurity
    - it services
    - information technology
    - crm
    - erp
    - sharepoint
    - servicenow
    - ai
    - artificial intelligence
    - machine learning
    - chatbot
    - hosting
    - programming
    - computer
    - e-government
    - egovernment
    - gis software
    - gis

  # Include if any of these codes appear in naics/psc/set_aside fields.
  # Substring match — listing "43" catches UNSPSC 43xxxxxx software/IT.
  # NAICS: IT services & data. NIGP: 208 software, 920 data processing,
  # 209 computer hardware/peripherals. Edit freely.
  include_codes:
    # --- IT NAICS ---
    - "541511"   # custom computer programming
    - "541512"   # computer systems design
    - "541519"   # other computer related services
    - "518210"   # data processing / hosting
    - "511210"   # software publishers
    - "541513"   # computer facilities management
    - "541611"   # admin/management consulting
    - "611420"   # computer training
    # --- UNSPSC software/IT family (prefix match) ---
    - "43"       # 43xxxxxx IT & software
    # --- NIGP commodity codes ---
    - "208"      # computer software
    - "920"      # data processing / IT services
    - "209"      # computer hardware & peripherals

  # Drop ONLY if one of these matches AND no strong-software term is present.
  exclude_keywords:
    - cabling
    - cable installation
    - wiring
    - electrical
    - conduit
    - fiber installation
    - network hardware installation
    - structured cabling
    - desktop hardware
    - pc hardware
    - roadwork
    - road construction
    - paving
    - hvac
    - plumbing
    - janitorial
    - landscaping
    - construction
    - furniture
    - uniforms
    - catering
    - vehicle
    - fuel
    - generator
    # --- Construction / facilities / physical work (your firm does none of it) ---
    - renovate
    - renovation
    - rehabilitate
    - rehab
    - roof
    - roofing
    - facade
    - masonry
    - concrete
    - demolition
    - boiler
    - chiller
    - elevator
    - escalator
    - heating
    - mechanical
    - sidewalk
    - sewer
    - bridge
    - asphalt
    - painting
    - flooring
    - grounds maintenance
    - mowing
    - food distribution
    - food service

  # --- Active-only date filter -----------------------------------------------
  # Show only opportunities that are still ACCEPTING BIDS.
  #   * If an item has a deadline, keep it only if the deadline is today/later.
  #   * If it has no deadline, keep it only if posted within stale_after_days.
  # Set drop_expired: false to see everything (including closed/old ones).
  drop_expired: true
  stale_after_days: 150

  # If ANY of these appears, we KEEP the item even when an exclude term matches.
  # (These are the unambiguous "this is really software" signals.)
  strong_software_keywords:
    - software
    - application
    - saas
    - cloud
    - laserfiche
    - mendix
    - low-code
    - low code
    - ".net"
    - dotnet
    - java
    - api
    - database
    - erp
    - crm
    - modernization
    - migration
    - integration
    - analytics
    - information technology
    - it services
    - web application
    - custom software


# -----------------------------------------------------------------------------
# SCORING — 0-100, used ONLY for sorting. It never hides anything.
# score = base + per_hit*(#include hits) + tier1_weight*(#tier1 hits) + code_bonus
# -----------------------------------------------------------------------------
scoring:
  base: 30
  per_hit: 6
  tier1_weight: 15
  code_hit_bonus: 20
  # Tier-1 = our sweet-spot capabilities; these push the score up the most.
  tier1_keywords:
    - laserfiche
    - mendix
    - low-code
    - low code
    - ".net"
    - dotnet
    - java
    - software
    - cloud
    - saas
    - modernization
    - migration
    - integration
    - custom software
    - document management
    - content management
    - erp
    - crm


# -----------------------------------------------------------------------------
# HISTORY — how long to remember seen opportunities (for cross-day dedupe).
# -----------------------------------------------------------------------------
history:
  retention_days: 180


# -----------------------------------------------------------------------------
# OPTIONAL Claude classifier for borderline IT-vs-non-IT calls.
# OFF by default so the baseline cost is $0 (pure keyword/code filtering).
# (Wiring is a later step; this flag is here so the config shape is stable.)
# -----------------------------------------------------------------------------
