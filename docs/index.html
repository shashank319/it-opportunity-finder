<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IT Opportunity Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="wrap">
      <h1>IT Opportunity Finder</h1>
      <p class="sub">State, county &amp; city (SLED) IT / software opportunities.
        <span id="meta"></span></p>
      <p id="health" class="health"></p>
    </div>
  </header>

  <main class="wrap">
    <!-- Controls -->
    <div class="controls">
      <input type="search" id="q" placeholder="Search title, agency, description…" autocomplete="off">
      <select id="state"><option value="">All states</option></select>
      <select id="source"><option value="">All sources</option></select>
      <select id="agency"><option value="">All agencies</option></select>
      <select id="sort">
        <option value="score">Sort: Score (high→low)</option>
        <option value="deadline">Sort: Deadline (soonest)</option>
        <option value="posted">Sort: Posted (newest)</option>
      </select>
      <label class="chk"><input type="checkbox" id="soon"> Deadline &lt; 14 days</label>
      <label class="chk"><input type="checkbox" id="newonly"> New (24h)</label>
      <label class="score-filter">Min score
        <input type="range" id="minscore" min="0" max="100" value="0" step="5">
        <span id="minscoreval">0</span>
      </label>
    </div>

    <p id="count" class="count"></p>

    <!-- Results table (collapses to cards on mobile via CSS) -->
    <table id="table">
      <thead>
        <tr>
          <th>Opportunity</th>
          <th>State</th>
          <th>Source</th>
          <th>Code</th>
          <th>Set-aside</th>
          <th>Posted</th>
          <th>Due</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <p id="empty" class="empty" hidden>No opportunities match your filters.</p>
  </main>

  <footer class="wrap">
    <p>Scores are for sorting only — your team decides what to bid. Data is public
       procurement info. No login, no tracking.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
